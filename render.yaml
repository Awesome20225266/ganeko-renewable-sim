# Render.com Blueprint — FastAPI app (API + dashboard + in-process scheduler) on Render,
# with the database on Supabase (managed Postgres).
#
# Deploy: New + → Blueprint → connect this repo → Apply. Render will prompt for the
# DATABASE_URL (paste your Supabase connection string — see DEPLOYMENT.md §Supabase).
#
# Free-tier note: a free web service would normally sleep after ~15 min idle. We keep it
# awake with KEEPALIVE_ENABLED=true — the in-process scheduler self-pings /health every
# 10 min (via the auto-injected RENDER_EXTERNAL_URL), which resets Render's idle timer and
# keeps the scheduler running so shared API keys always get fast, fresh (<=15 min) data.
# For a hard always-on guarantee, use a paid plan and add a `type: worker` service running
# `bash scripts/entrypoint.sh scheduler` (same DATABASE_URL).
services:
  - type: web
    name: renewable-sim
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: bash scripts/entrypoint.sh api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL          # paste your Supabase pooler URL (incl. ?sslmode=require)
        sync: false
      - key: ADMIN_BOOTSTRAP_KEY   # auto-generated strong admin key
        generateValue: true
      - key: SCHEDULER_ENABLED     # in-process scheduler (free single service)
        value: "true"
      - key: DASHBOARD_CONSOLE_WRITE  # keyless console; set false to lock down public access
        value: "true"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: PLANT_CODE
        value: HYBRID01
      - key: PLANT_NAME
        value: Ganeko Two Energy Private Limited
      - key: PLANT_LAT
        value: "17.60"
      - key: PLANT_LON
        value: "76.36"
      - key: PLANT_TZ
        value: Asia/Kolkata
      - key: LIVE_REFRESH_MINUTES
        value: "15"
      - key: KEEPALIVE_ENABLED      # self-ping /health to prevent free-tier idle spin-down
        value: "true"
      # KEEPALIVE_URL left unset → falls back to Render's auto-injected RENDER_EXTERNAL_URL
