# Render.com Blueprint — deploy with: New + → Blueprint → connect this repo.
# Free-tier friendly: one Docker web service (runs the API + dashboard + in-process
# scheduler) plus a free Postgres database. No paid background worker required.
#
# Notes:
#  * Free web services sleep after ~15 min idle; the first request then takes ~30s and
#    the in-process scheduler pauses while asleep (fine for a demo). For always-on +
#    a dedicated scheduler worker, move to a paid plan and add a `type: worker` service
#    running `bash scripts/entrypoint.sh scheduler`.
#  * Migrations + idempotent seed run automatically on boot (see scripts/entrypoint.sh).
databases:
  - name: renewable-db
    plan: free
    databaseName: renewable
    user: renew

services:
  - type: web
    name: renewable-sim
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: bash scripts/entrypoint.sh api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: renewable-db
          property: connectionString
      - key: ADMIN_BOOTSTRAP_KEY      # auto-generated strong admin key
        generateValue: true
      - key: SCHEDULER_ENABLED        # in-process scheduler (free single service)
        value: "true"
      - key: DASHBOARD_CONSOLE_WRITE  # keyless console (set false to lock down)
        value: "true"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: PLANT_CODE
        value: HYBRID01
      - key: PLANT_NAME
        value: Jaisalmer Hybrid Park
      - key: PLANT_LAT
        value: "26.9124"
      - key: PLANT_LON
        value: "70.9026"
      - key: PLANT_TZ
        value: Asia/Kolkata
      - key: LIVE_REFRESH_MINUTES
        value: "30"
